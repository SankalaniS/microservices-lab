server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: item-service
          uri: http://item-service:8081
          predicates:
            - Path=/items/**
          filters:
            - StripPrefix=1

        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/orders/**
          filters:
            - StripPrefix=1

        - id: payment-service
          uri: http://payment-service:8083
          predicates:
            - Path=/payments/**
          filters:
            - StripPrefix=1